# 应用配置（可通过环境变量覆盖）
server:
  host: "0.0.0.0"
  port: 8080

log:
  level: "info"  # debug, info, warn, error
  format: "json" # json 或 console

database:
  url: "postgres://postgres:postgres123@localhost:5432/golang_learn?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

jwt:
  secret: "your-256-bit-secret-change-in-production"
  expire_hours: 24
